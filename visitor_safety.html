<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Norden Shipyard - Safety Orientation</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#1a1a2e;color:#333;overflow:hidden;}
.lang-select{position:fixed;top:0;left:0;right:0;bottom:0;background:#0b1f4d;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;}
.lang-select img{width:120px;margin-bottom:30px;}
.lang-select h1{color:white;font-size:28px;margin-bottom:40px;text-align:center;}
.lang-btn{background:white;color:#0b1f4d;border:none;padding:16px 48px;border-radius:12px;font-size:20px;font-weight:700;cursor:pointer;margin:10px;min-width:200px;}
.lang-btn:hover{background:#e2e8f0;}
.slideshow{display:none;position:fixed;top:0;left:0;right:0;bottom:0;flex-direction:column;}
.slideshow.active{display:flex;}
.slide-header{background:#0b1f4d;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.slide-counter{color:#93c5fd;font-size:13px;font-weight:600;}
.slide-content{flex:1;overflow-y:auto;background:white;}
.slide{display:none;padding:24px 20px;min-height:100%;}
.slide.active{display:block;}
.slide-title{font-size:20px;font-weight:700;color:#0b1f4d;text-align:center;border-bottom:3px solid #0b1f4d;padding-bottom:12px;margin-bottom:20px;text-transform:uppercase;letter-spacing:1px;}
.slide-body{font-size:15px;line-height:1.7;color:#374151;}
.slide-body ul{padding-left:20px;margin-top:10px;}
.slide-body ul li{margin-bottom:8px;}
.slide-body p{margin-bottom:12px;}
.highlight{background:#fef9c3;border-left:4px solid #f59e0b;padding:12px 16px;border-radius:0 8px 8px 0;margin:16px 0;font-weight:600;}
.danger{background:#fee2e2;border-left:4px solid #ef4444;padding:12px 16px;border-radius:0 8px 8px 0;margin:16px 0;font-weight:600;color:#991b1b;}
.info-box{background:#dbeafe;border-left:4px solid #3b82f6;padding:12px 16px;border-radius:0 8px 8px 0;margin:16px 0;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0;}
.card{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:16px;}
.card h4{color:#0b1f4d;margin-bottom:8px;font-size:14px;}
.yard-photo{width:100%;border-radius:10px;margin:16px 0;max-height:200px;object-fit:cover;}
.safety-plan{width:100%;border-radius:10px;margin:16px 0;}
.contact-box{background:#0b1f4d;color:white;border-radius:12px;padding:16px;margin:16px 0;text-align:center;}
.contact-box h3{font-size:18px;margin-bottom:12px;color:#93c5fd;}
.contact-item{margin:8px 0;font-size:15px;}
.contact-item strong{color:#fbbf24;}
.footer-nav{background:#0b1f4d;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px;}
.nav-btn{background:#1e3a6e;color:white;border:none;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;flex:1;max-width:140px;}
.nav-btn:hover{background:#2d4f8a;}
.nav-btn:disabled{opacity:0.4;cursor:not-allowed;}
.progress-bar{flex:1;background:#1e3a6e;border-radius:4px;height:8px;overflow:hidden;}
.progress-fill{height:100%;background:#3b82f6;transition:width 0.3s;}
.complete-btn{background:#10b981;color:white;border:none;padding:14px 28px;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;width:100%;margin-top:10px;display:none;}
.complete-btn.show{display:block;}
@media(max-width:600px){
  .two-col{grid-template-columns:1fr;}
  .slide-title{font-size:17px;}
  .slide-body{font-size:14px;}
  .nav-btn{padding:10px 14px;font-size:13px;}
}
</style>
</head>
<body>

<!-- LANGUAGE SELECTION -->
<div class="lang-select" id="langSelect">
  <div style="width:100px;height:100px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:24px;">
    <span style="font-size:40px;">⚓</span>
  </div>
  <h1>Norden Shipyard<br><span style="font-size:18px;opacity:0.8;">Safety Orientation</span></h1>
  <p style="color:#93c5fd;margin-bottom:30px;text-align:center;">Select your language / Kies uw taal</p>
  <button class="lang-btn" onclick="startSlides('en')">🇬🇧 English</button>
  <button class="lang-btn" onclick="startSlides('nl')">🇳🇱 Nederlands</button>
</div>

<!-- SLIDESHOW -->
<div class="slideshow" id="slideshow">
  <div class="slide-header">
    <div style="color:white;font-weight:700;font-size:16px;">⚓ Norden Shipyard</div>
    <div class="slide-counter" id="slideCounter">1 / {{ slides|length }}</div>
  </div>

  <div class="slide-content" id="slideContent">
    {% for slide in slides %}
    <div class="slide {% if loop.first %}active{% endif %}" id="slide-{{ loop.index }}">
      <div class="slide-title" id="title-{{ loop.index }}">{{ slide[3] }}</div>
      <div class="slide-body">
        <div id="content-{{ loop.index }}-en">{{ slide[5] | safe }}</div>
        <div id="content-{{ loop.index }}-nl" style="display:none">{{ slide[6] | safe }}</div>
        {% if loop.last %}
        <form method="post" action="/visitor/safety-complete" style="margin-top:16px;">
          <button type="submit" class="complete-btn show" id="completeBtn">✅ Complete Safety Orientation</button>
        </form>
        {% endif %}
      </div>
    </div>
    {% endfor %}
  </div>

  <div class="footer-nav">
    <button class="nav-btn" id="prevBtn" onclick="changeSlide(-1)" disabled>← Prev</button>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:{% if slides %}{{ (1 / slides|length * 100)|int }}{% else %}0{% endif %}%"></div></div>
    <button class="nav-btn" id="nextBtn" onclick="changeSlide(1)">Next →</button>
  </div>
</div>

<script>
let currentSlide = 1;
const totalSlides = {{ slides|length }};
let lang = 'en';

const titlesEn = [{% for slide in slides %}"{{ slide[3] | replace('"', '\\"') }}"{% if not loop.last %},{% endif %}{% endfor %}];
const titlesNl = [{% for slide in slides %}"{{ slide[4] | replace('"', '\\"') }}"{% if not loop.last %},{% endif %}{% endfor %}];

function startSlides(selectedLang) {
  lang = selectedLang;
  document.getElementById('langSelect').style.display = 'none';
  document.getElementById('slideshow').classList.add('active');
  applyLang();
  updateNav();
}

function applyLang() {
  for (let i = 1; i <= totalSlides; i++) {
    const enEl = document.getElementById('content-' + i + '-en');
    const nlEl = document.getElementById('content-' + i + '-nl');
    if (enEl) enEl.style.display = lang === 'en' ? '' : 'none';
    if (nlEl) nlEl.style.display = lang === 'nl' ? '' : 'none';
  }
  const titles = lang === 'nl' ? titlesNl : titlesEn;
  titles.forEach((title, i) => {
    const el = document.getElementById('title-' + (i + 1));
    if (el) el.textContent = title;
  });
  document.getElementById('prevBtn').textContent = lang === 'nl' ? '← Vorige' : '← Prev';
  document.getElementById('nextBtn').textContent = lang === 'nl' ? 'Volgende →' : 'Next →';
  const cb = document.getElementById('completeBtn');
  if (cb) cb.textContent = lang === 'nl' ? '✅ Veiligheidsoriëntatie voltooien' : '✅ Complete Safety Orientation';
}

function changeSlide(dir) {
  document.getElementById('slide-' + currentSlide).classList.remove('active');
  currentSlide += dir;
  document.getElementById('slide-' + currentSlide).classList.add('active');
  document.getElementById('slideContent').scrollTop = 0;
  updateNav();
}

function updateNav() {
  document.getElementById('slideCounter').textContent = currentSlide + ' / ' + totalSlides;
  document.getElementById('prevBtn').disabled = currentSlide === 1;
  document.getElementById('nextBtn').disabled = currentSlide === totalSlides;
  document.getElementById('progressFill').style.width = (currentSlide / totalSlides * 100) + '%';
}
</script>
</body>
</html>
